<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Planner - Master Platform</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide React Icons -->
    <script src="https://unpkg.com/lucide-react"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #fff1f2; margin: 0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(244, 114, 182, 0.3); border-radius: 10px; }
        
        /* Animasi halu */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, deleteDoc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Simpan ke window agar bisa diakses oleh skrip Babel
        window.FirebaseLib = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, deleteDoc, updateDoc, query, where, getDocs };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // --- DATA KONFIGURASI ---
        // PENTING: Jika di GitHub, pastikan config ini terisi data asli Firebase Anda
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "", 
            authDomain: "", 
            projectId: "", 
            storageBucket: "", 
            messagingSenderId: "", 
            appId: ""
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'wedding-planner-robi';
        const INITIAL_ADMIN_USER = "admin_wedding"; 
        const INITIAL_ADMIN_PASS = "admin12345";

        const KATEGORI_SESERAHAN = ["Alat Sholat", "Make Up", "Peralatan Mandi", "Pakaian", "Perhiasan", "Lainnya"];

        // --- HELPERS ---
        const formatRupiah = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n || 0);
        const formatInput = (v) => v.toString().replace(/\D/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        const parseInput = (v) => Number(v.toString().replace(/\./g, ''));

        // Komponen Ikon yang Aman (Tidak akan error jika Lucide belum load)
        const Icon = ({ name, size = 20, className = "" }) => {
            const lib = window.lucideReact || window.LucideReact;
            if (!lib) return <div style={{width: size, height: size}} className="bg-gray-200 rounded-full animate-pulse" />;
            const LucideIcon = lib[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : <span className="text-[8px]">?</span>;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white/80 backdrop-blur-sm border border-rose-100 rounded-[2rem] p-6 shadow-sm ${className}`}>{children}</div>
        );

        // ==========================================
        // KOMPONEN LAYAR
        // ==========================================

        const Dashboard = ({ stats, name, currentClientId, db }) => {
            const [localName, setLocalName] = useState(name || 'Pasangan Bahagia');
            const [isEdit, setIsEdit] = useState(false);

            const saveName = async () => {
                const docRef = window.FirebaseLib.doc(db, 'artifacts', appId, 'public', 'data', 'client_settings', currentClientId);
                await window.FirebaseLib.setDoc(docRef, { namaPasangan: localName }, { merge: true });
                setIsEdit(false);
            };

            return (
                <div className="space-y-6 fade-in">
                    <div className="flex justify-between items-center">
                        <div>
                            <p className="text-rose-400 text-xs font-bold uppercase tracking-widest">Jurnal Pernikahan</p>
                            {isEdit ? (
                                <div className="flex gap-2 mt-2">
                                    <input value={localName} onChange={e => setLocalName(e.target.value)} className="border-b-2 border-rose-300 outline-none bg-transparent text-2xl font-serif" />
                                    <button onClick={saveName} className="text-green-500"><Icon name="Check" /></button>
                                </div>
                            ) : (
                                <div className="flex items-center gap-3 mt-2">
                                    <h1 className="text-3xl font-serif font-bold text-rose-900">{localName}</h1>
                                    <button onClick={() => setIsEdit(true)} className="text-rose-300"><Icon name="Edit3" size={18} /></button>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="bg-gradient-to-br from-rose-400 to-pink-500 p-8 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                        <div className="relative z-10">
                            <p className="text-rose-100 text-sm">Total Tabungan</p>
                            <h2 className="text-4xl font-bold my-2">{formatRupiah(stats.totalTabungan)}</h2>
                            <div className="mt-6">
                                <div className="flex justify-between text-xs mb-2 font-bold">
                                    <span>Target: {formatRupiah(stats.target)}</span>
                                    <span>{((stats.totalTabungan/stats.target)*100 || 0).toFixed(1)}%</span>
                                </div>
                                <div className="h-2 bg-white/20 rounded-full overflow-hidden">
                                    <div className="h-full bg-white transition-all duration-1000" style={{width: `${Math.min((stats.totalTabungan/stats.target)*100, 100)}%`}}></div>
                                </div>
                            </div>
                        </div>
                        <Icon name="Heart" size={150} className="absolute -right-10 -bottom-10 opacity-10 rotate-12" />
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                        <Card><p className="text-[10px] uppercase font-bold text-gray-400">Seserahan</p><p className="text-xl font-bold text-rose-900">{formatRupiah(stats.totalSeserahan)}</p></Card>
                        <Card><p className="text-[10px] uppercase font-bold text-gray-400">Vendor WO</p><p className="text-xl font-bold text-rose-900">{formatRupiah(stats.totalWO)}</p></Card>
                        <Card className="col-span-2 md:col-span-1"><p className="text-[10px] uppercase font-bold text-gray-400">Kekurangan</p><p className="text-xl font-bold text-rose-500">{formatRupiah(stats.totalWO - stats.dpWO)}</p></Card>
                    </div>
                </div>
            );
        };

        const AdminPanel = ({ allClients, db, adminData, onLogout }) => {
            const [form, setForm] = useState({ username: '', password: '', licenseId: '', expiryDate: '', isActive: true });
            const add = async (e) => {
                e.preventDefault();
                await window.FirebaseLib.addDoc(window.FirebaseLib.collection(db, 'artifacts', appId, 'public', 'data', 'subscriptions'), form);
                setForm({ username: '', password: '', licenseId: '', expiryDate: '', isActive: true });
            };
            return (
                <div className="space-y-8 fade-in max-w-4xl mx-auto">
                    <div className="flex justify-between items-center">
                        <h1 className="text-2xl font-serif font-bold">Panel Master Admin</h1>
                        <button onClick={onLogout} className="bg-rose-500 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-md">Logout</button>
                    </div>
                    <Card className="border-rose-200">
                        <h3 className="font-bold mb-4 flex items-center gap-2"><Icon name="UserPlus" className="text-rose-500" /> Tambah Pelanggan</h3>
                        <form onSubmit={add} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input placeholder="Username" className="p-3 border rounded-xl" value={form.username} onChange={e => setForm({...form, username: e.target.value})} required />
                            <input placeholder="Password" className="p-3 border rounded-xl" value={form.password} onChange={e => setForm({...form, password: e.target.value})} required />
                            <input placeholder="ID Lisensi" className="p-3 border rounded-xl" value={form.licenseId} onChange={e => setForm({...form, licenseId: e.target.value})} required />
                            <input type="date" className="p-3 border rounded-xl" value={form.expiryDate} onChange={e => setForm({...form, expiryDate: e.target.value})} required />
                            <button className="md:col-span-2 bg-rose-500 text-white p-4 rounded-xl font-bold">Aktifkan Lisensi</button>
                        </form>
                    </Card>
                    <Card className="p-0 overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-rose-50 font-bold"><tr><th className="p-4">User</th><th className="p-4">Exp</th><th className="p-4 text-right">Aksi</th></tr></thead>
                            <tbody>
                                {allClients.map(c => (
                                    <tr key={c.id} className="border-t">
                                        <td className="p-4 font-bold">{c.username}</td>
                                        <td className="p-4">{c.expiryDate}</td>
                                        <td className="p-4 text-right"><Icon name={c.isActive ? "CheckCircle" : "XCircle"} className={c.isActive ? "text-green-500 ml-auto" : "text-gray-300 ml-auto"} /></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </Card>
                </div>
            );
        };

        // ==========================================
        // ROOT APPLICATION
        // ==========================================

        function App() {
            const [user, setUser] = useState(null);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [activeMenu, setActiveMenu] = useState('dashboard');
            const [isLocked, setIsLocked] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [currentClientId, setCurrentClientId] = useState(null);
            
            const [masterAdminData, setMasterAdminData] = useState({ username: INITIAL_ADMIN_USER, password: INITIAL_ADMIN_PASS });
            const [loginForm, setLoginForm] = useState({ u: '', p: '' });
            const [loginError, setLoginError] = useState('');

            // Wedding Data States
            const [settings, setSettings] = useState({ namaPasangan: '', rencanaAnggaran: 100000000 });
            const [seserahan, setSeserahan] = useState([]);
            const [tabungan, setTabungan] = useState([]);
            const [wo, setWo] = useState({ namaWO: '', totalHarga: 0, dpMasuk: 0 });
            const [clients, setClients] = useState([]);

            const { FirebaseLib } = window;
            const app = FirebaseLib.initializeApp(firebaseConfig);
            const auth = FirebaseLib.getAuth(app);
            const db = FirebaseLib.getFirestore(app);

            useEffect(() => {
                const unsub = FirebaseLib.onAuthStateChanged(auth, (u) => { setUser(u); setIsAuthReady(true); });
                FirebaseLib.signInAnonymously(auth).catch(err => console.error("Firebase Login Error. Check your Config!"));
                return unsub;
            }, []);

            // Global Snapshots
            useEffect(() => {
                if (!user || !isAuthReady) return;
                const adminRef = FirebaseLib.doc(db, 'artifacts', appId, 'public', 'data', 'admin_config', 'master_account');
                return FirebaseLib.onSnapshot(adminRef, (d) => d.exists() && setMasterAdminData(d.data()));
            }, [user, isAuthReady]);

            useEffect(() => {
                if (!user || !isAdmin || !isAuthReady) return;
                const q = FirebaseLib.collection(db, 'artifacts', appId, 'public', 'data', 'subscriptions');
                return FirebaseLib.onSnapshot(q, (s) => setClients(s.docs.map(d => ({id: d.id, ...d.data()}))));
            }, [user, isAdmin, isAuthReady]);

            useEffect(() => {
                if (!user || !currentClientId || isAdmin || !isAuthReady) return;
                const p = (c) => FirebaseLib.collection(db, 'artifacts', appId, 'public', 'data', `${c}_${currentClientId}`);
                const d = (c) => FirebaseLib.doc(db, 'artifacts', appId, 'public', 'data', c, currentClientId);

                const u1 = FirebaseLib.onSnapshot(d('client_settings'), (snap) => snap.exists() && setSettings(snap.data()));
                const u2 = FirebaseLib.onSnapshot(d('client_wo'), (snap) => snap.exists() && setWo(snap.data()));
                const u3 = FirebaseLib.onSnapshot(p('seserahan'), (snap) => setSeserahan(snap.docs.map(x => ({id: x.id, ...x.data()}))));
                const u4 = FirebaseLib.onSnapshot(p('tabungan'), (snap) => setTabungan(snap.docs.map(x => ({id: x.id, ...x.data()}))));
                
                return () => { u1(); u2(); u3(); u4(); };
            }, [user, currentClientId, isAdmin, isAuthReady]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                if (loginForm.u === masterAdminData.username && loginForm.p === masterAdminData.password) {
                    setIsAdmin(true); setIsLocked(false); setActiveMenu('admin_panel');
                    return;
                }
                const q = FirebaseLib.query(FirebaseLib.collection(db, 'artifacts', appId, 'public', 'data', 'subscriptions'), FirebaseLib.where("username", "==", loginForm.u), FirebaseLib.where("password", "==", loginForm.p));
                const snap = await FirebaseLib.getDocs(q);
                if (!snap.empty) {
                    const data = snap.docs[0].data();
                    if (!data.isActive || new Date() > new Date(data.expiryDate)) {
                        setLoginError('Akun tidak aktif atau masa berlaku habis.');
                    } else {
                        setCurrentClientId(data.licenseId); setIsAdmin(false); setIsLocked(false); setActiveMenu('dashboard');
                    }
                } else { setLoginError('Username atau Password salah.'); }
            };

            if (!isAuthReady) return <div className="h-screen flex items-center justify-center font-bold text-rose-400">MEMULAI SISTEM...</div>;

            if (isLocked) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
                        <div className="w-full max-w-sm fade-in">
                            <Card className="shadow-2xl p-10 text-center">
                                <div className="w-20 h-20 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-6 text-rose-500"><Icon name="Lock" size={40} /></div>
                                <h1 className="text-2xl font-serif font-bold text-rose-900 mb-8 uppercase tracking-widest">Wedding Access</h1>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input placeholder="Username" className="w-full p-4 rounded-2xl border outline-none text-center" value={loginForm.u} onChange={e => setLoginForm({...loginForm, u: e.target.value})} required />
                                    <input type="password" placeholder="Password" className="w-full p-4 rounded-2xl border outline-none text-center tracking-widest" value={loginForm.p} onChange={e => setLoginForm({...loginForm, p: e.target.value})} required />
                                    {loginError && <p className="text-rose-500 text-xs font-bold">{loginError}</p>}
                                    <button className="w-full bg-rose-500 text-white p-4 rounded-2xl font-bold shadow-lg hover:scale-105 transition-transform">Masuk Aplikasi</button>
                                </form>
                            </Card>
                        </div>
                    </div>
                );
            }

            const totalTabungan = tabungan.reduce((s, i) => s + Number(i.jumlah || 0), 0);
            const totalSeserahan = seserahan.reduce((s, i) => s + Number(i.harga || 0), 0);

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <aside className="w-full md:w-72 bg-white border-b md:border-r border-rose-100 p-6 flex flex-col sticky top-0 h-auto md:h-screen z-20">
                        <h2 className="text-xl font-serif font-bold text-rose-600 mb-8 text-center uppercase tracking-tighter">Wedding Planner</h2>
                        <nav className="flex-1 space-y-1">
                            {(isAdmin ? [{ id: 'admin_panel', icon: 'ShieldCheck', label: 'Master Admin' }] : [
                                { id: 'dashboard', icon: 'LayoutDashboard', label: 'Dashboard' },
                                { id: 'seserahan', icon: 'Gift', label: 'Seserahan' },
                                { id: 'tabungan', icon: 'PiggyBank', label: 'Tabungan' },
                                { id: 'wo', icon: 'CalendarHeart', label: 'Vendor WO' }
                            ]).map(item => (
                                <button key={item.id} onClick={() => setActiveMenu(item.id)} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeMenu === item.id ? 'bg-rose-100 text-rose-600 font-bold' : 'text-gray-400 hover:bg-rose-50'}`}>
                                    <Icon name={item.icon} /> {item.label}
                                </button>
                            ))}
                        </nav>
                        <button onClick={handleLogout} className="flex items-center justify-center gap-2 p-4 text-rose-400 font-bold hover:bg-rose-50 rounded-2xl mt-4"><Icon name="LogOut" /> Keluar</button>
                    </aside>
                    <main className="flex-1 p-6 md:p-10 overflow-y-auto custom-scrollbar">
                        <div className="max-w-4xl mx-auto">
                            {activeMenu === 'dashboard' && <Dashboard stats={{totalTabungan, target: settings.rencanaAnggaran, totalSeserahan, totalWO: wo.totalHarga, dpWO: wo.dpMasuk}} name={settings.namaPasangan} currentClientId={currentClientId} db={db} />}
                            {activeMenu === 'admin_panel' && <AdminPanel allClients={clients} db={db} adminData={masterAdminData} onLogout={handleLogout} />}
                            {activeMenu === 'seserahan' && <Seserahan db={db} currentClientId={currentClientId} data={seserahan} />}
                            {activeMenu === 'tabungan' && <Tabungan db={db} currentClientId={currentClientId} data={tabungan} target={settings.rencanaAnggaran} />}
                            {activeMenu === 'wo' && <BookingWO db={db} currentClientId={currentClientId} data={wo} />}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
